{% extends 'base.html' %}
{% block content %}
<form role="form" method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-12">
            <div class="box box-primary">
                <div class="box-header with-border"><h3 class="box-title">{{ titulo }}</h3></div>
                <div class="box-body">
                    <div class="row">
                        <div class="col-md-6 form-group"><label>Nome Completo / Razão Social</label>{{ form.nome }}</div>
                        <div class="col-md-3 form-group"><label>CPF</label>{{ form.cpf }}</div>
                        <div class="col-md-3 form-group"><label>CNPJ</label>{{ form.cnpj }}</div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 form-group"><label>Telefone / WhatsApp</label>{{ form.telefone }}</div>
                        <div class="col-md-8 form-group"><label>E-mail</label>{{ form.email }}</div>
                    </div>
                    <div class="form-group"><label>Endereço Completo</label>{{ form.endereco }}</div>
                </div>
                <div class="box-footer">
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                    <a href="{% url 'operations:lista_clientes' %}" class="btn btn-default">Cancelar</a>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
